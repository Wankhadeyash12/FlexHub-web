<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizer Dashboard - FlexHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <nav>
    <h1>Organizer Dashboard</h1>
    <div>
      <a href="/">Home</a>
      <a href="/analytics">Analytics</a>
    </div>
    <div id="nav-user-info"></div>
  </nav>

  <div class="container page-shell">
    <section class="hero glass-card" style="padding: 2.5rem;">
      <div class="dashboard-header" style="margin-bottom: 0;">
        <div>
          <div class="hero-eyebrow">Organizer Workspace</div>
          <h1 class="page-title" style="margin-bottom: 0.75rem;">Your events, approvals, and publishing flow.</h1>
          <p class="page-subtitle">Manage every stage of your event pipeline from one focused dashboard.</p>
        </div>
        <button id="createEventBtn" class="btn-primary">Create New Event</button>
      </div>
    </section>

    <div class="dashboard-stats">
      <div class="stat-card">
        <p>Total Events</p>
        <p id="totalEventsCount">0</p>
      </div>
      <div class="stat-card">
        <p>Total Registrations</p>
        <p id="totalRegistrationsCount">0</p>
      </div>
      <div class="stat-card">
        <p>Published Events</p>
        <p id="publishedEventsCount">0</p>
      </div>
      <div class="stat-card">
        <p>Pending Approvals</p>
        <p id="pendingApprovalsCount">0</p>
      </div>
    </div>

    <div class="tabs-nav">
      <button class="tab-link active" onclick="switchOrganizerTab('all-events')">
        All Events
      </button>
      <button class="tab-link" onclick="switchOrganizerTab('published')">
        Published
      </button>
      <button class="tab-link" onclick="switchOrganizerTab('drafts')">
        Drafts
      </button>
    </div>

    <div id="eventsContainer" class="events-grid">
      <div class="panel text-center p-2" style="grid-column: 1 / -1;">
        <p>Loading events...</p>
      </div>
    </div>
  </div>

  <div id="registrationsModal" class="modal"></div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    let allOrganizerEvents = [];
    let currentOrganizerTab = 'all-events';

    document.addEventListener('DOMContentLoaded', () => {
      redirectIfNotRole('organizer');
      setupOrganizerDashboard();
      updateNavigation();
    });

    const setupOrganizerDashboard = async () => {
      try {
        const response = await eventAPI.getOrganizerEvents();
        allOrganizerEvents = response.events;

        updateOrganizerStats();
        displayOrganizerEvents(allOrganizerEvents);
        setupEventActionButtons();
      } catch (error) {
        alert('Error loading events: ' + error.message);
      }
    };

    const updateOrganizerStats = () => {
      const total = allOrganizerEvents.length;
      const published = allOrganizerEvents.filter(e => e.isPublished).length;
      const drafts = total - published;

      let pendingApprovals = 0;
      allOrganizerEvents.forEach(event => {
        pendingApprovals += event.totalRegistrations;
      });

      document.getElementById('totalEventsCount').textContent = total;
      document.getElementById('publishedEventsCount').textContent = published;
      document.getElementById('pendingApprovalsCount').textContent = drafts;
      document.getElementById('totalRegistrationsCount').textContent = allOrganizerEvents.reduce((sum, e) => sum + e.totalRegistrations, 0);
    };

    const switchOrganizerTab = (tabName) => {
      currentOrganizerTab = tabName;

      document.querySelectorAll('.tab-link').forEach(link => {
        link.classList.remove('active');
      });
      event.target.classList.add('active');

      let filteredEvents = allOrganizerEvents;

      if (tabName === 'published') {
        filteredEvents = allOrganizerEvents.filter(e => e.isPublished);
      } else if (tabName === 'drafts') {
        filteredEvents = allOrganizerEvents.filter(e => !e.isPublished);
      }

      displayOrganizerEvents(filteredEvents);
    };

    const displayOrganizerEvents = (events) => {
      const container = document.getElementById('eventsContainer');

      if (events.length === 0) {
        container.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;"><h2>No events to display</h2><p><a href="/create-event">Create your first event</a></p></div>';
        return;
      }

      container.innerHTML = events
        .map((event) => {
          const eventDate = new Date(event.eventDateTime).toLocaleDateString();
          const status = event.isPublished ? 'Published' : 'Draft';
          const statusClass = event.isPublished ? 'status-published' : 'status-draft';

          return `
            <div class="event-card">
              <div class="event-card-header">
                <h3>${event.title}</h3>
                <span class="status ${statusClass}">${status}</span>
              </div>
              <p><strong>Date:</strong> ${eventDate}</p>
              <p><strong>Mode:</strong> ${event.eventMode.toUpperCase()}</p>
              <p><strong>Team Size:</strong> ${event.teamMinSize} - ${event.teamMaxSize}</p>
              <p><strong>Registrations:</strong> ${event.totalRegistrations}</p>
              <p><strong>Fee:</strong> Rs. ${event.registrationFee}</p>
              <div class="event-actions">
                ${!event.isPublished ? `
                  <button class="btn-publish" onclick="publishEvent('${event._id}')">Publish</button>
                ` : ''}
                <button class="btn-view" onclick="viewEventRegistrations('${event._id}', '${event.title}')">Registrations</button>
                <button class="btn-analytics" onclick="viewEventAnalytics('${event._id}', '${event.title}')">Analytics</button>
                <button class="btn-edit" onclick="editEvent('${event._id}')">Edit</button>
                <button class="btn-delete" onclick="deleteEvent('${event._id}')">Delete</button>
              </div>
            </div>
          `;
        })
        .join('');
    };

    const publishEvent = async (eventId) => {
      try {
        await eventAPI.publishEvent(eventId);
        alert('Event published successfully!');
        setupOrganizerDashboard();
      } catch (error) {
        alert('Error publishing event: ' + error.message);
      }
    };

    const viewEventRegistrations = (eventId, eventTitle) => {
      eventAPI.getEventRegistrations(eventId)
        .then((response) => {
          const registrations = response.registrations;
          displayRegistrationsModal(registrations, eventId, eventTitle);
        })
        .catch((error) => {
          alert('Error loading registrations: ' + error.message);
        });
    };

    const displayRegistrationsModal = (registrations, eventId, eventTitle) => {
      let modal = document.getElementById('registrationsModal');

      if (registrations.length === 0) {
        modal.innerHTML = `
          <div class="modal-content">
            <span class="close" onclick="document.getElementById('registrationsModal').style.display='none'">&times;</span>
            <h2>Registrations for ${eventTitle}</h2>
            <p class="text-center" style="color: var(--text-muted);">No registrations yet.</p>
          </div>
        `;
      } else {
        const registrationsHTML = registrations
          .map((reg) => `
            <tr>
              <td>${reg.participant.name}</td>
              <td>${reg.participant.email}</td>
              <td>${reg.teamName}</td>
              <td>${reg.teamMembers.length}</td>
              <td><span class="status status-${reg.approvalStatus.toLowerCase()}">${reg.approvalStatus}</span></td>
              <td><span class="status status-${reg.paymentStatus.toLowerCase()}">${reg.paymentStatus}</span></td>
              <td>
                ${reg.approvalStatus === 'Pending' ? `
                  <button onclick="approveRegistration('${reg._id}')" class="btn-approve">Approve</button>
                  <button onclick="rejectRegistration('${reg._id}')" class="btn-reject">Reject</button>
                ` : `${reg.approvalStatus}`}
              </td>
            </tr>
          `)
          .join('');

        modal.innerHTML = `
          <div class="modal-content">
            <span class="close" onclick="document.getElementById('registrationsModal').style.display='none'">&times;</span>
            <h2>Registrations for ${eventTitle}</h2>
            <div style="overflow-x: auto;">
              <table class="registrations-table">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Team Name</th>
                    <th>Team Size</th>
                    <th>Approval</th>
                    <th>Payment</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  ${registrationsHTML}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      modal.style.display = 'block';
    };

    const approveRegistration = async (registrationId) => {
      try {
        await registrationAPI.approveRegistration(registrationId);
        alert('Registration approved!');
        document.getElementById('registrationsModal').style.display = 'none';
        setupOrganizerDashboard();
      } catch (error) {
        alert('Error approving registration: ' + error.message);
      }
    };

    const rejectRegistration = async (registrationId) => {
      try {
        await registrationAPI.rejectRegistration(registrationId);
        alert('Registration rejected!');
        document.getElementById('registrationsModal').style.display = 'none';
        setupOrganizerDashboard();
      } catch (error) {
        alert('Error rejecting registration: ' + error.message);
      }
    };

    const viewEventAnalytics = (eventId, eventTitle) => {
      window.location.href = `/analytics?eventId=${eventId}&eventTitle=${encodeURIComponent(eventTitle)}`;
    };

    const editEvent = (eventId) => {
      alert('Edit functionality coming soon!');
    };

    const deleteEvent = (eventId) => {
      if (confirm('Are you sure you want to delete this event? This action cannot be undone.')) {
        eventAPI.deleteEvent(eventId)
          .then(() => {
            alert('Event deleted successfully!');
            setupOrganizerDashboard();
          })
          .catch((error) => {
            alert('Error deleting event: ' + error.message);
          });
      }
    };

    const setupEventActionButtons = () => {
      const createBtn = document.getElementById('createEventBtn');
      if (createBtn) {
        createBtn.onclick = () => {
          window.location.href = '/create-event';
        };
      }
    };
  </script>
</body>
</html>
